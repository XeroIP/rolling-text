version: 0.4.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  provider: ^6.1.5
  google_fonts: ^8.0.2
